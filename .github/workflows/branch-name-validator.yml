name: branch-name-validator

on: [pull_request]

jobs:
  check-jira-prefix:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Validate branch name
        run: |
          # Extract branch name from GITHUB_HEAD_REF (for PRs)
          BRANCH_NAME="${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}"
          
          echo "Branch name: $BRANCH_NAME"
          
          # Define allowed pattern: feature/*, bugfix/*, hotfix/*, release/*
          PATTERN="^(no-ticket/|renovate[-/]|hotfix/|IPB-[0-9]+/|COS-[0-9]+/)"
          
          if [[ ! "$BRANCH_NAME" =~ $PATTERN ]]; then
            echo "❌ Branch name '$BRANCH_NAME' is invalid."
            echo "Allowed format: no-ticket/NAME or IPB-[JIRANUMBER]/name"
            exit 1
          fi
          
          echo "✅ Branch name is valid."
